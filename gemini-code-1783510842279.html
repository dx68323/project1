<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה אישית 💌</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
            padding-top: 15vh;
            overflow: hidden;
        }
        h1 {
            color: #d63384;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.5rem;
            color: #555;
        }
        .buttons-container {
            margin-top: 50px;
            position: relative;
            height: 200px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #yes-btn {
            background-color: #28a745;
            margin-left: 20px;
        }
        #yes-btn:hover {
            background-color: #218838;
            transform: scale(1.1);
        }
        #no-btn {
            background-color: #dc3545;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>ציפורה, תרצי לצאת איתי לדייט ביום שישי? 💖</h1>
    <p>אני מבטיח שיהיה כיף, טעים, ומלא פוצי מוצי!</p>

    <div class="buttons-container">
        <button id="yes-btn" class="btn" onclick="alert('יששש! אני מתחיל לתכנן לנו את שישי 😍')">ברור שכן!</button>
        <button id="no-btn" class="btn">פחות מתאים לי</button>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 200);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });
    </script>

</body>
</html>
